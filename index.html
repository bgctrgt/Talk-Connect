<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Answer Revealed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #003A8F, #00A0DC);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
    }

    .badge {
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .answer {
      font-size: 28px;
      font-weight: bold;
      background: rgba(255,255,255,0.15);
      padding: 15px 25px;
      border-radius: 10px;
      display: inline-block;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <div class="icon">✅</div>

    <div class="badge">CONGRATULATIONS</div>

    <h1>You found the hidden answer</h1>

    <p>
      Great observation and attention to detail.
      The correct answer is:
    </p>

    <div class="answer">
      Transformer-based Architecture (C)
    </div>

    <div class="footer">
      FT Türkiye AI Board • AI Program
    </div>

  </div>

</body>
</html>
